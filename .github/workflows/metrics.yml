name: Measure Nuxt Performance

on:
  push:
    branches: [v4]

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🧰 Checkout repository
        uses: actions/checkout@v4

      - name: 🧱 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: ⚙️ Enable Corepack + install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm -v  # ✅ check dat pnpm beschikbaar is

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Measure dev startup
        run: node scripts/metrics/measure-dev.js

      - name: 🏗️ Measure build time
        run: node scripts/metrics/measure-build.js

      - name: 🌐 Measure preview startup
        run: node scripts/metrics/measure-preview.js

      - name: 🚨 Check performance thresholds
        run: node scripts/metrics/check-performance-thresholds.js

      - name: 📤 Upload metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-performance-metrics
          path: metrics/
