name: Measure Nuxt Performance

on:
  push:
    branches: [v4]

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🧰 Checkout repository
        uses: actions/checkout@v4

      # Gebruik eerst Node en activeer daarna pnpm via Corepack
      - name: 🧱 Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: ⚙️ Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Measure dev startup
        run: node scripts/metrics/measure-dev.js

      - name: 🏗️ Measure build time
        run: node scripts/metrics/measure-build.js

      - name: 🌐 Measure preview startup
        run: node scripts/metrics/measure-preview.js

      - name: 🚨 Check performance thresholds
        run: node scripts/metrics/check-performance-thresholds.js

      - name: 📤 Upload metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-performance-metrics
          path: metrics/
